name: Deploy

on:
   workflow_run:
      workflows: ["Ping"]
      types: [completed]
      branches: [website]
   workflow_dispatch:
      inputs:
         target:
            description: "Target to deploy"
            required: true
            type: choice
            default: all
            options:
               - all
               - pages
               - vercel

concurrency:
   group: deploy
   cancel-in-progress: false

env:
   GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
   WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
   GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
   WAKATIME_USERNAME: ${{ secrets.WAKATIME_USERNAME }}

jobs:
   github-pages:
      if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'pages'))
      permissions:
         contents: read
         pages: write
         id-token: write
      runs-on: ubuntu-latest
      env:
         BUILD_TARGET: vercel
         SITE_URL: https://faelayis.github.io/faelayis
      steps:
         - name: Checkout
           uses: actions/checkout@v4
           with:
              ref: website

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version-file: package.json

         - name: Get Bun cache directory
           id: bun-cache
           run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

         - name: Cache Bun dependencies
           uses: actions/cache@v4
           with:
              path: ${{ steps.bun-cache.outputs.dir }}
              key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
              restore-keys: |
                 ${{ runner.os }}-bun-

         - name: Install dependencies
           run: bun install --frozen-lockfile

         - name: Build static site
           run: bun run build:static

         - name: Add 404
           run: cp build/index.html build/404.html

         - name: Setup Pages
           uses: actions/configure-pages@v4

         - name: Upload artifact
           uses: actions/upload-pages-artifact@v3
           with:
              path: ./build

   github-pages-deploy:
      if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'pages'))
      needs: github-pages
      permissions:
         pages: write
         id-token: write
      environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      steps:
         - name: Deploy to GitHub Pages
           id: deployment
           uses: actions/deploy-pages@v4

   vercel-deploy:
      if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'vercel'))
      permissions:
         contents: read
      runs-on: ubuntu-latest
      env:
         BUILD_TARGET: static
         SITE_URL: https://faelayis.vercel.app
      steps:
         - name: Checkout
           uses: actions/checkout@v4
           with:
              ref: website

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version-file: package.json

         - name: Get Bun cache directory
           id: bun-cache
           run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

         - name: Cache Bun dependencies
           uses: actions/cache@v4
           with:
              path: ${{ steps.bun-cache.outputs.dir }}
              key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
              restore-keys: |
                 ${{ runner.os }}-bun-

         - name: Install dependencies
           run: bun install --frozen-lockfile

         - name: Link Vercel project
           run: |
              mkdir -p .vercel
              cat > .vercel/project.json << EOF
              {
                "orgId": "${{ secrets.VERCEL_ORG_ID }}",
                "projectId": "${{ secrets.VERCEL_PROJECT_ID }}"
              }
              EOF

         - name: Pull Vercel Environment Variables
           run: bunx vercel env pull .env.vercel --yes --token=${{ secrets.VERCEL_TOKEN }}

         - name: Build
           run: bun run vercel-build

         - name: Deploy to Vercel
           if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.target == 'vercel')
           run: bunx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
           env:
              VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
              VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
