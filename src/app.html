<!doctype html>
<html lang="%sveltekit.lang%">
	<head>
		<meta charset="utf-8" />
		<!-- <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" /> -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-image-preview:none, max-video-preview:0" />
		<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-image-preview:none, max-video-preview:0" />
		<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
		<meta name="referrer" content="no-referrer" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)" />
		<meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none'" />
		<meta http-equiv="X-Frame-Options" content="DENY" />
		<link rel="preconnect" href="https://api.github.com" crossorigin />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Geist:wght@400..500&family=Geist+Mono:wght@400..500&display=swap"
			rel="stylesheet"
		/>
		<script>
			(function () {
				try {
					var theme = localStorage.getItem("faelayis-theme");
					if (theme !== "light" && theme !== "dark") {
						theme = "light";
					}
					document.documentElement.setAttribute("data-theme", theme);
				} catch (error) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
