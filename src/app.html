<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" /> -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-image-preview:none, max-video-preview:0" />
		<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-image-preview:none, max-video-preview:0" />
		<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
		<meta name="referrer" content="no-referrer" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)" />
		<script>
			(function () {
				try {
					var theme = localStorage.getItem("faelayis-theme");
					if (theme !== "light" && theme !== "dark") {
						theme = "light";
					}
					document.documentElement.setAttribute("data-theme", theme);
				} catch (error) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
